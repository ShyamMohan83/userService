spring.application.name=userService

# 1. Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_shop_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. MyBatis Configuration
# Update these to match your "com.move" package structure!
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.move.userService.model

# 3. Logging
logging.level.org.springframework=INFO
# Match your mapper package here too
logging.level.com.move.userService.mapper=DEBUG

server.port=8082